{% extends "base.html" %}
{% block title %}History &middot; {{ app_name }}{% endblock %}
{% block page_title %}History{% endblock %}

{% block content %}

<div class="card filter-card">
  <div class="filter-row">
    <div class="filter-field filter-field-grow">
      <label class="field-label" for="searchInput">Search</label>
      <input type="text" id="searchInput" class="field-input" placeholder="Search by sensor name or temperature…">
    </div>
    <div class="filter-field">
      <label class="field-label" for="statusFilter">Status</label>
      <select id="statusFilter" class="field-input">
        <option value="">All statuses</option>
        <option value="normal">Normal</option>
        <option value="elevated">Elevated</option>
        <option value="warning">Warning</option>
        <option value="critical">Critical</option>
      </select>
    </div>
    <div class="filter-field">
      <label class="field-label" for="fromDate">From</label>
      <input type="date" id="fromDate" class="field-input">
    </div>
    <div class="filter-field">
      <label class="field-label" for="toDate">To</label>
      <input type="date" id="toDate" class="field-input">
    </div>
    <div class="filter-field filter-field-buttons">
      <button class="btn btn-secondary" id="clearFiltersBtn">Clear</button>
      <button class="btn btn-primary" id="exportCsvBtn">
        <svg viewBox="0 0 16 16" fill="none" width="16" height="16"><path d="M8 1.5v8M8 9.5 5 6.5M8 9.5l3-3M2.5 11v2.5a1 1 0 0 0 1 1h9a1 1 0 0 0 1-1V11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Export CSV
      </button>
    </div>
  </div>
</div>

<div class="card table-card">
  <div class="table-scroll">
    <table class="data-table" id="historyTable">
      <thead>
        <tr>
          <th>Timestamp</th>
          <th>Sensor</th>
          <th>Temp (°C)</th>
          <th>Humidity (%)</th>
          <th>Fan</th>
          <th>AC</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="historyTbody">
        <tr><td colspan="7" class="table-loading">Loading readings…</td></tr>
      </tbody>
    </table>
  </div>

  <div class="table-footer">
    <span id="resultsSummary" class="results-summary">—</span>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

{% endblock %}

{% block extra_scripts %}
<script src="{{ url_for('static', filename='js/history.js') }}"></script>
{% endblock %}
